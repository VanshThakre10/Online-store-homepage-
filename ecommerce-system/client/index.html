<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern E-Commerce Store</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5', // Indigo-600
                        secondary: '#ec4899', // Pink-500
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex flex-col min-h-screen">
    
    <!-- Sticky Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="#" class="text-2xl font-bold text-gray-900 tracking-tight">
                        Store<span class="text-primary">X</span>
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors font-medium">Home</a>
                    <a href="#products" class="text-gray-600 hover:text-primary transition-colors font-medium">Shop</a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors font-medium">Categories</a>
                    
                    <!-- Cart Icon -->
                    <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-primary transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span id="cartCount" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Cart Modal (Hidden by default) -->
    <div id="cartModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-[100] hidden flex justify-end">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col translate-x-0 transition-transform duration-300">
            <div class="flex items-center justify-between p-4 border-b">
                <h2 class="text-xl font-bold">Your Cart</h2>
                <button onclick="toggleCart()" class="text-gray-500 hover:text-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Cart items populated here -->
                <div class="text-center text-gray-400 mt-10">Your cart is empty</div>
            </div>
            
            <div class="p-4 border-t bg-gray-50">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <button onclick="openCheckout()" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal (Hidden by default) -->
    <div id="checkoutModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">Checkout</h2>
                <button onclick="closeCheckout()" class="text-gray-500 hover:text-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="checkoutForm" onsubmit="submitOrder(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="custName" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-primary focus:border-primary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="custPhone" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-primary focus:border-primary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Shipping Address</label>
                    <textarea id="custAddr" required rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-primary focus:border-primary outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition mt-4">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Main Content Layout -->
    <main class="flex-grow">
        <!-- Hero Section -->
        <section class="bg-primary/5 py-16 sm:py-24">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center border-b border-gray-200 pb-16">
                <h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tight mb-4">
                    Discover Quality Products
                </h1>
                <p class="text-lg md:text-xl text-gray-600 max-w-2xl mx-auto mb-8">
                    Shop the best modern gadgets, apparels, and essentials securely.
                </p>
                <a href="#products" class="inline-block bg-primary text-white font-semibold px-8 py-3 rounded-full hover:bg-indigo-700 transition shadow-lg">Shop Now</a>
            </div>
        </section>

        <!-- Search and Filters -->
        <section id="products" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-2xl font-bold text-gray-900">Featured Products</h2>
                <div class="flex gap-4 w-full md:w-auto">
                    <input type="text" id="searchInput" placeholder="Search products..." class="border border-gray-300 rounded-lg px-4 py-2 w-full md:w-64 focus:ring-primary focus:border-primary outline-none">
                </div>
            </div>

            <!-- Product Grid -->
            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Products dynamically injected via JS -->
                <div class="col-span-full text-center py-12 text-gray-500">
                    Loading products...
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2026 StoreX. Built for Resume.</p>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
